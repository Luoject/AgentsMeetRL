name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [gh-pages, main]
    paths:
      - 'knowledge-ops-dashboard.html'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp knowledge-ops-dashboard.html _site/index.html
          cp knowledge-ops-dashboard.html _site/knowledge-ops-dashboard.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
